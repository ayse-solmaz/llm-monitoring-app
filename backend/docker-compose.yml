services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-monitoring-postgres
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llm_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm -d llm_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
