# Render Blueprint — backend API + Postgres
# https://render.com/docs/blueprint-spec
#
# Postgres was created via MCP as llm-monitoring-db.
# This file documents the web service config; link DATABASE_URL in the
# Render Dashboard: Web Service → Environment → Link Database.

services:
  - type: web
    name: llm-monitoring-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/v1/healthz
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://llm-monitoring-app.vercel.app
      - key: BUILD_VERSION
        value: "0.1.0"
      - key: DATABASE_URL
        fromDatabase:
          name: llm-monitoring-db
          property: connectionString

databases:
  - name: llm-monitoring-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
