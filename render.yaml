# Render Blueprint — masterfabric-go backend + Postgres
services:
  - type: web
    name: llm-monitoring-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/v1/healthz
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://llm-monitoring-app.vercel.app
      - key: KAFKA_ENABLED
        value: "false"
      - key: WS_ENABLED
        value: "false"
      - key: BUILD_VERSION
        value: "0.1.0"
      - key: DATABASE_URL
        fromDatabase:
          name: llm-monitoring-db
          property: connectionString

databases:
  - name: llm-monitoring-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
